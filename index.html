<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Pokemon Infinite Fusion Draft</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/draft.css">
<link rel="stylesheet" href="css/wheel.css">
<link rel="stylesheet" href="css/fusion.css">
</head>

<body>

<div id="app">

<header>

<h1>Pokemon Infinite Fusion Draft</h1>

</header>

<section id="setup" class="heroScreen">

<div class="heroBackdrop" aria-hidden="true">
    <div class="backdropOrb orbOne"></div>
    <div class="backdropOrb orbTwo"></div>
    <div class="backdropOrb orbThree"></div>
    <div class="spriteScene">
        <div class="spriteSprite spriteA"></div>
        <div class="spriteSprite spriteB"></div>
        <div class="spriteSprite spriteC"></div>
        <div class="spriteSprite spriteD"></div>
    </div>
</div>

<div class="heroContent">

<div class="setupPanel card">
    <div class="setupPanelHeader">
        <h3>Start the draft</h3>
        <p>(Don't all be Braden)</p>
    </div>

    <label class="fieldLabel">
        Players
        <select id="playerCount">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
    </label>

    <div id="playerInputs"></div>

    <button id="beginGame">Begin Draft</button>
</div>

</div>

</section>

<section id="wheelScreen" class="hidden">

<h2>Draft Order Wheel</h2>

<div id="wheelContainer">

<canvas
id="wheel"
width="650"
height="650">
</canvas>

</div>

<div id="wheelStatus"></div>

<button id="spinButton">
Spin
</button>

</section>

<section id="draftScreen" class="hidden">

<div id="roundInfo"></div>

<div id="draftOrder"></div>

<div id="pokemonChoices"></div>

<div id="players"></div>

</section>

<section id="fusionScreen" class="hidden">

<h2>Fusion Results</h2>

<div id="fusionTeams"></div>

</section>

</div>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/wheel.js"></script>
<script src="js/draft.js"></script>
<script src="js/fusion.js"></script>
<script src="js/app.js"></script>

</body>
</html>
